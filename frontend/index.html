<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="">
    <title>Recipe Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar container">
        <a href="index.html" class="logo">DishDiary</a>
        <div class="nav-links">
            <!-- Populated by JS -->
        </div>
    </nav>

    <header class="container home-hero">
        <!-- Overlay for better text readability -->
        <div class="home-hero-overlay">
        </div>

        <div class="home-hero-content">
            <h1 class="home-hero-title">
                Discover your next<br>
                <span style="color: #ffd700;">favorite meal</span>
            </h1>
            <p class="home-hero-subtitle">
                Browse thousands of recipes, personalized to your dietary preferences and cooking habits.
            </p>

            <div class="home-hero-search">
                <input type="text" id="hero-search-input" class="form-input"
                    placeholder="What do you want to cook today?">
                <button id="hero-search-btn" class="btn btn-primary">
                    Search
                </button>
            </div>
        </div>
    </header>

    <section class="container home-featured">
        <div class="home-featured-header">
            <h2 class="home-featured-title">Featured Recipes</h2>
            <a href="search.html" class="home-featured-link">View all
                &rarr;</a>
        </div>

        <div id="featured-grid" class="grid">
            <!-- Recipes via JS -->
        </div>
    </section>

    <!-- Scripts -->
    <script type="module" src="js/index.js"></script>
</body>

</html>
